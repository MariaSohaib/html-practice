<!DOCTYPE html>
<html>
<head>
   <title>Page Layout</title>
   <style>
       .header { font-size: 40px; color: #009900; font-weight: bold; }
       .menu { position: sticky; top: 0; background-color: #009900; padding: 10px 0; color: white; overflow: hidden; }
       .menu a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; font-size: 20px; }
       .menu-log { float: right; }
       .body_sec { margin-left: 20px; }
       footer { width: 100%; bottom: 0; background-color: #000; color: #fff; position: absolute; padding: 20px 0; text-align: center; font-size: 30px; font-weight: bold; }
   </style>
</head>
<body>
   <!-- Header Section -->
   <header>
       <div class="header">GeeksforGeeks</div>
       <div class="sub-header">A computer science portal for geeks</div>
   </header>
   <!-- Menu Navigation Bar -->
   <nav class="menu">
       <a href="#home">HOME</a>
       <a href="#news">NEWS</a>
       <a href="#notification">NOTIFICATIONS</a>
       <div class="menu-log">
           <a href="#login">LOGIN</a>
       </div>
   </nav>
   <!-- Body Section -->
   <main class="body_sec">
       <section id="Content">
           <h3>Content section</h3>
       </section>
   </main>
   <!-- Footer Section -->
   <footer>Footer Section</footer>
</body>
</html>
